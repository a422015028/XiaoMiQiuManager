name: Build and release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag name for manual release runs'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle', '**/*.kts') }}
          restore-keys: |
            gradle-

      - name: Restore fixed signing keystore
        id: restore-signing-keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          echo "storePassword=$KEYSTORE_PASSWORD" > release-key.properties
          echo "keyPassword=$KEY_PASSWORD" >> release-key.properties
          echo "keyAlias=$KEY_ALIAS" >> release-key.properties
          echo "storeFile=release.jks" >> release-key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build release APK
        run: ./gradlew -p app assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaomiqiu-release-apk
          path: app/build/outputs/apk/release/app-release.apk
